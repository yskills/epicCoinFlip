<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPIC FINAL BATTLE</title>
<style>
/* ═══════════════════════════════════════════════════════
   ROOT & RESET
   ═══════════════════════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --hero-color: #00bfff;
  --hero-glow:  #00bfff80;
  --villain-color: #ff2060;
  --villain-glow:  #ff206080;
  --gold: #ffd700;
  --bg-dark: #0a0a12;
}
html, body { width:100%; height:100%; overflow:hidden; font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg-dark); color:#eee; }

/* ═══════════════════════════════════════════════════════
   ANIMATED BACKGROUND  –  layered energy waves
   ═══════════════════════════════════════════════════════ */
#bg-canvas {
  position:fixed; inset:0; z-index:0; width:100%; height:100%;
}

/* ═══════════════════════════════════════════════════════
   OVERLAY LAYERS
   ═══════════════════════════════════════════════════════ */
#flash-overlay {
  position:fixed; inset:0; z-index:9999; background:#fff; opacity:0;
  pointer-events:none; transition: opacity .05s;
}
#dark-overlay {
  position:fixed; inset:0; z-index:800; background:rgba(0,0,0,0.85); opacity:0;
  pointer-events:none; transition: opacity .4s;
}

/* ═══════════════════════════════════════════════════════
   START SCREEN
   ═══════════════════════════════════════════════════════ */
#start-screen {
  position:fixed; inset:0; z-index:500; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:28px;
  background: radial-gradient(ellipse at center, #15152a 0%, #0a0a12 100%);
  transition: opacity .8s, transform .8s;
}
#start-screen.hide { opacity:0; transform:scale(1.1); pointer-events:none; }

#start-screen h1 {
  font-size:clamp(2.4rem,6vw,4.5rem); font-weight:900; letter-spacing:4px;
  background: linear-gradient(90deg, var(--hero-color), var(--villain-color));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  text-shadow:0 0 60px var(--hero-glow), 0 0 60px var(--villain-glow);
  animation: titlePulse 2s ease-in-out infinite alternate;
}
@keyframes titlePulse {
  0%   { filter:brightness(1) drop-shadow(0 0 12px var(--hero-glow)); }
  100% { filter:brightness(1.3) drop-shadow(0 0 30px var(--villain-glow)); }
}
#start-screen .subtitle {
  font-size:1rem; color:#888; letter-spacing:6px; text-transform:uppercase;
}
.name-inputs { display:flex; gap:20px; flex-wrap:wrap; justify-content:center; }
.name-inputs label { display:flex; flex-direction:column; align-items:center; gap:6px; font-size:.85rem; color:#aaa; }
.name-inputs input {
  width:200px; padding:12px 16px; border:2px solid #333; border-radius:12px;
  background:#111; color:#fff; font-size:1.1rem; text-align:center;
  transition: border-color .3s, box-shadow .3s; outline:none;
}
.name-inputs input:focus { border-color:var(--hero-color); box-shadow:0 0 20px var(--hero-glow); }
.name-inputs input:last-of-type:focus { border-color:var(--villain-color); box-shadow:0 0 20px var(--villain-glow); }

#start-btn {
  margin-top:12px; padding:18px 48px; font-size:1.3rem; font-weight:800;
  border:none; border-radius:16px; cursor:pointer; letter-spacing:2px;
  background: linear-gradient(135deg, var(--hero-color), var(--villain-color));
  color:#fff; position:relative; overflow:hidden;
  box-shadow:0 0 30px var(--hero-glow), 0 0 30px var(--villain-glow);
  transition: transform .2s, box-shadow .2s;
}
#start-btn:hover { transform:scale(1.06); box-shadow:0 0 50px var(--hero-glow), 0 0 50px var(--villain-glow); }
#start-btn:active { transform:scale(.97); }
#start-btn .btn-shine {
  position:absolute; top:-50%; left:-60%; width:40%; height:200%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.25), transparent);
  transform:skewX(-20deg); animation:btnShine 3s infinite;
}
@keyframes btnShine { 0%{left:-60%} 50%{left:120%} 100%{left:120%} }

/* ═══════════════════════════════════════════════════════
   BATTLE SCREEN
   ═══════════════════════════════════════════════════════ */
#battle-screen {
  position:fixed; inset:0; z-index:100; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition: opacity .8s;
}
#battle-screen.show { opacity:1; pointer-events:auto; }

/* ARENA */
#arena {
  display:flex; align-items:center; justify-content:space-between;
  width:min(900px,90vw); gap:20px; transition: transform .25s;
  position:relative;
}

/* FIGHTER CARD */
.fighter {
  display:flex; flex-direction:column; align-items:center; gap:10px;
  flex:1; min-width:0;
}
.fighter-name {
  font-size:clamp(1rem,2.5vw,1.5rem); font-weight:800; letter-spacing:2px;
  text-shadow:0 0 14px currentColor;
}
.fighter.hero .fighter-name  { color:var(--hero-color); }
.fighter.villain .fighter-name { color:var(--villain-color); }

.fighter-avatar {
  font-size:clamp(4rem,10vw,7rem); line-height:1;
  filter:drop-shadow(0 0 20px currentColor);
  transition: transform .2s, filter .2s;
}
.fighter.hero .fighter-avatar  { color:var(--hero-color); }
.fighter.villain .fighter-avatar { color:var(--villain-color); }
.fighter-avatar.hit { animation: hitShake .3s ease; }
@keyframes hitShake {
  0%,100%{transform:translateX(0)} 25%{transform:translateX(-12px) rotate(-4deg)} 75%{transform:translateX(12px) rotate(4deg)}
}

/* HP BAR */
.hp-bar-wrap {
  width:100%; max-width:260px; height:22px; background:#1a1a2e;
  border-radius:12px; overflow:hidden; border:2px solid #333;
  position:relative;
}
.hp-bar {
  height:100%; border-radius:10px; transition: width .35s ease-out;
  position:relative; overflow:hidden;
}
.fighter.hero .hp-bar    { background:linear-gradient(90deg, #006aff, #00e5ff); }
.fighter.villain .hp-bar { background:linear-gradient(90deg, #ff2060, #ff6040); }
.hp-bar::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(180deg, rgba(255,255,255,.25) 0%, transparent 60%);
}
.hp-bar-glow {
  position:absolute; inset:-4px; border-radius:14px; opacity:.5;
  transition: opacity .3s;
}
.fighter.hero .hp-bar-glow    { box-shadow:0 0 16px var(--hero-color); }
.fighter.villain .hp-bar-glow { box-shadow:0 0 16px var(--villain-color); }
.hp-text {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-size:.75rem; font-weight:700; text-shadow:0 1px 3px #000; pointer-events:none;
}

/* VS BADGE */
#vs-badge {
  font-size:clamp(1.8rem,4vw,3rem); font-weight:900; color:var(--gold);
  text-shadow:0 0 30px rgba(255,215,0,.6);
  animation: vsPulse 1.5s ease-in-out infinite alternate;
  flex-shrink:0;
}
@keyframes vsPulse { 0%{transform:scale(1);opacity:.7} 100%{transform:scale(1.15);opacity:1} }

/* COMBAT LOG */
#combat-log {
  margin-top:30px; width:min(700px,88vw); max-height:90px; overflow-y:auto;
  font-size:.8rem; color:#888; text-align:center; line-height:1.6;
  scrollbar-width:none;
}
#combat-log::-webkit-scrollbar { display:none; }

/* PHASE BANNER */
#phase-banner {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0);
  z-index:850; font-size:clamp(2rem,6vw,4rem); font-weight:900;
  pointer-events:none; opacity:0; white-space:nowrap;
  text-shadow:0 0 40px currentColor, 0 0 80px currentColor;
  transition: transform .4s cubic-bezier(.17,.67,.29,1.4), opacity .4s;
}
#phase-banner.show { transform:translate(-50%,-50%) scale(1); opacity:1; }

/* SPECIAL TEXT */
#special-text {
  position:fixed; top:42%; left:50%; transform:translate(-50%,-50%) scale(0);
  z-index:900; font-size:clamp(2.5rem,7vw,5rem); font-weight:900;
  pointer-events:none; opacity:0; letter-spacing:6px;
  text-shadow:0 0 30px currentColor, 0 0 60px currentColor, 0 0 100px currentColor;
}
#special-text.show { transform:translate(-50%,-50%) scale(1); opacity:1; transition: transform .35s cubic-bezier(.17,.67,.29,1.4), opacity .35s; }
#special-text.hide { transform:translate(-50%,-50%) scale(1.5); opacity:0; transition: transform .3s, opacity .3s; }

/* BEAM */
#beam {
  position:fixed; top:50%; height:18px; z-index:870;
  pointer-events:none; opacity:0; border-radius:10px;
  box-shadow: 0 0 30px currentColor, 0 0 60px currentColor, 0 0 100px currentColor;
}
#beam.hero-beam {
  left:-10%; color:var(--hero-color);
  background:linear-gradient(90deg, transparent, var(--hero-color), #fff, var(--hero-color), transparent);
}
#beam.villain-beam {
  right:-10%; color:var(--villain-color);
  background:linear-gradient(90deg, transparent, var(--villain-color), #fff, var(--villain-color), transparent);
}

/* FLOATING DAMAGE */
.dmg-float {
  position:absolute; font-weight:900; pointer-events:none; z-index:600;
  animation: floatUp 1.1s ease-out forwards;
  text-shadow:0 0 8px currentColor;
}
@keyframes floatUp {
  0%   { opacity:1; transform:translateY(0) scale(1); }
  70%  { opacity:1; transform:translateY(-70px) scale(1.2); }
  100% { opacity:0; transform:translateY(-110px) scale(.8); }
}

/* IMPACT EMOJIS */
.impact-emoji {
  position:absolute; pointer-events:none; z-index:610;
  animation: emojiPop .8s ease-out forwards;
}
@keyframes emojiPop {
  0%   { opacity:1; transform:translate(0,0) scale(.5) rotate(0deg); }
  50%  { opacity:1; transform:translate(var(--dx),var(--dy)) scale(1.4) rotate(180deg); }
  100% { opacity:0; transform:translate(calc(var(--dx)*1.5),calc(var(--dy)*1.5)) scale(.3) rotate(360deg); }
}

/* SCREEN SHAKE */
.shake-light  { animation: shakeL .3s ease; }
.shake-medium { animation: shakeM .4s ease; }
.shake-heavy  { animation: shakeH .5s ease; }
@keyframes shakeL {
  0%,100%{transform:translate(0,0)} 20%{transform:translate(-3px,2px)} 40%{transform:translate(4px,-2px)} 60%{transform:translate(-2px,3px)} 80%{transform:translate(3px,-1px)}
}
@keyframes shakeM {
  0%,100%{transform:translate(0,0)} 15%{transform:translate(-7px,4px)} 30%{transform:translate(8px,-5px)} 45%{transform:translate(-6px,7px)} 60%{transform:translate(7px,-3px)} 75%{transform:translate(-4px,5px)}
}
@keyframes shakeH {
  0%,100%{transform:translate(0)} 10%{transform:translate(-14px,8px) rotate(-1deg)} 20%{transform:translate(12px,-10px) rotate(1deg)} 30%{transform:translate(-10px,12px) rotate(-1.5deg)} 40%{transform:translate(14px,-6px) rotate(1deg)} 50%{transform:translate(-8px,10px)} 60%{transform:translate(10px,-12px)} 70%{transform:translate(-12px,6px)} 80%{transform:translate(8px,-8px)} 90%{transform:translate(-6px,4px)}
}

/* GLOW PULSE on fighters */
.glow-pulse { animation: glowPulse .6s ease; }
@keyframes glowPulse {
  0%,100% { filter:drop-shadow(0 0 20px currentColor); }
  50%     { filter:drop-shadow(0 0 60px currentColor) brightness(1.8); }
}

/* WINNER */
.winner-glow {
  animation: winGlow 1.2s ease-in-out infinite alternate;
}
@keyframes winGlow {
  0%   { filter:drop-shadow(0 0 20px var(--gold)) brightness(1); transform:scale(1); }
  100% { filter:drop-shadow(0 0 60px var(--gold)) brightness(1.4); transform:scale(1.08); }
}

/* ═══════════════════════════════════════════════════════
   END SCREEN
   ═══════════════════════════════════════════════════════ */
#end-screen {
  position:fixed; inset:0; z-index:1000; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:30px;
  background:rgba(0,0,0,.88); opacity:0; pointer-events:none;
  transition: opacity .8s;
}
#end-screen.show { opacity:1; pointer-events:auto; }

#winner-text {
  font-size:clamp(2rem,6vw,4.5rem); font-weight:900; text-align:center;
  background:linear-gradient(90deg, var(--gold), #fff, var(--gold));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  animation: winTextPulse 1.5s ease-in-out infinite alternate;
  filter:drop-shadow(0 0 30px rgba(255,215,0,.6));
}
@keyframes winTextPulse {
  0%{transform:scale(1);filter:drop-shadow(0 0 20px rgba(255,215,0,.4))}
  100%{transform:scale(1.06);filter:drop-shadow(0 0 50px rgba(255,215,0,.8))}
}
#winner-emoji {
  font-size:clamp(4rem,10vw,8rem);
  animation: winGlow 1.2s ease-in-out infinite alternate;
}
#restart-btn {
  padding:16px 44px; font-size:1.2rem; font-weight:700;
  border:2px solid var(--gold); border-radius:14px; cursor:pointer;
  background:transparent; color:var(--gold); letter-spacing:2px;
  transition: background .3s, transform .2s, box-shadow .3s;
}
#restart-btn:hover { background:rgba(255,215,0,.15); transform:scale(1.05); box-shadow:0 0 30px rgba(255,215,0,.3); }

/* PARTICLES CONTAINER */
#particles { position:fixed; inset:0; z-index:60; pointer-events:none; overflow:hidden; }

/* AMBIENT FLOATING PARTICLES */
.ambient-particle {
  position:absolute; border-radius:50%; pointer-events:none;
  animation: ambientFloat linear infinite;
  opacity:.25;
}
@keyframes ambientFloat {
  0%   { transform:translateY(0) translateX(0) scale(1); opacity:.15; }
  50%  { transform:translateY(-40vh) translateX(30px) scale(1.2); opacity:.35; }
  100% { transform:translateY(-100vh) translateX(-20px) scale(.6); opacity:0; }
}

/* BURST PARTICLES (specials/crits) */
.burst-particle {
  position:absolute; pointer-events:none; font-size:1.6rem;
  animation: burstOut .9s ease-out forwards;
}
@keyframes burstOut {
  0%   { opacity:1; transform:translate(0,0) scale(.5); }
  60%  { opacity:1; }
  100% { opacity:0; transform:translate(var(--bx),var(--by)) scale(0); }
}

/* ENERGY RING (specials) */
.energy-ring {
  position:absolute; border-radius:50%; pointer-events:none; z-index:860;
  border:3px solid currentColor;
  box-shadow:0 0 20px currentColor, inset 0 0 20px currentColor;
  animation: ringExpand .8s ease-out forwards;
}
@keyframes ringExpand {
  0%   { width:20px; height:20px; opacity:1; }
  100% { width:300px; height:300px; opacity:0; margin-top:-150px; margin-left:-150px; }
}

/* SPEED LINES */
.speed-line {
  position:fixed; height:2px; pointer-events:none; z-index:810;
  animation: speedLine .4s linear forwards;
}
@keyframes speedLine {
  0%   { width:0; opacity:.8; }
  50%  { width:60vw; opacity:.6; }
  100% { width:100vw; opacity:0; }
}

/* ZOOM effect */
#arena.zoom-in { transition: transform .4s cubic-bezier(.17,.67,.29,1.4); transform:scale(1.15); }
#arena.zoom-out { transition: transform .6s ease-out; transform:scale(1); }

/* Slow-mo aura */
.slowmo { filter:saturate(1.4) contrast(1.1); }

/* Ground crack */
.ground-crack {
  position:fixed; bottom:0; left:0; right:0; height:60px; z-index:65;
  pointer-events:none; opacity:0;
  background:repeating-linear-gradient(90deg, transparent, transparent 8%, rgba(255,100,0,.15) 8%, transparent 8.5%);
  transition: opacity .5s;
}
.ground-crack.active { opacity:1; }

/* Countdown overlay */
#countdown {
  position:fixed; inset:0; z-index:950; display:flex; align-items:center; justify-content:center;
  pointer-events:none; font-size:clamp(5rem,14vw,10rem); font-weight:900;
  color:var(--gold); text-shadow:0 0 60px rgba(255,215,0,.7);
  opacity:0; transition: opacity .15s;
}
#countdown.show { opacity:1; }
</style>
</head>
<body>

<!-- BACKGROUND CANVAS -->
<canvas id="bg-canvas"></canvas>

<!-- OVERLAYS -->
<div id="flash-overlay"></div>
<div id="dark-overlay"></div>

<!-- AMBIENT PARTICLES -->
<div id="particles"></div>

<!-- COUNTDOWN -->
<div id="countdown"></div>

<!-- PHASE BANNER -->
<div id="phase-banner"></div>

<!-- SPECIAL TEXT -->
<div id="special-text"></div>

<!-- BEAM -->
<div id="beam"></div>

<!-- GROUND CRACK -->
<div class="ground-crack" id="ground-crack"></div>

<!-- ═══════ START SCREEN ═══════ -->
<div id="start-screen">
  <h1>⚔️ EPIC FINAL BATTLE ⚔️</h1>
  <div class="subtitle">cinematic coin-flip showdown</div>
  <div class="name-inputs">
    <label>
      🦸 Hero
      <input id="hero-name-input" type="text" placeholder="Kopf" maxlength="16" autocomplete="off">
    </label>
    <label>
      🦹 Villain
      <input id="villain-name-input" type="text" placeholder="Zahl" maxlength="16" autocomplete="off">
    </label>
  </div>
  <button id="start-btn"><span class="btn-shine"></span>⚔️ START FINAL BATTLE</button>
</div>

<!-- ═══════ BATTLE SCREEN ═══════ -->
<div id="battle-screen">
  <div id="arena">
    <!-- HERO -->
    <div class="fighter hero" id="hero">
      <div class="fighter-name" id="hero-name">Kopf</div>
      <div class="fighter-avatar" id="hero-avatar">🦸</div>
      <div class="hp-bar-wrap">
        <div class="hp-bar-glow"></div>
        <div class="hp-bar" id="hero-hp-bar" style="width:100%"></div>
        <div class="hp-text" id="hero-hp-text">100 / 100</div>
      </div>
    </div>
    <!-- VS -->
    <div id="vs-badge">VS</div>
    <!-- VILLAIN -->
    <div class="fighter villain" id="villain">
      <div class="fighter-name" id="villain-name">Zahl</div>
      <div class="fighter-avatar" id="villain-avatar">🦹</div>
      <div class="hp-bar-wrap">
        <div class="hp-bar-glow"></div>
        <div class="hp-bar" id="villain-hp-bar" style="width:100%"></div>
        <div class="hp-text" id="villain-hp-text">100 / 100</div>
      </div>
    </div>
  </div>
  <div id="combat-log"></div>
</div>

<!-- ═══════ END SCREEN ═══════ -->
<div id="end-screen">
  <div id="winner-emoji"></div>
  <div id="winner-text"></div>
  <button id="restart-btn">🔄 RESTART</button>
</div>

<!-- ═══════════════════════════════════════════════════════
     JAVASCRIPT  –  one monolithic, modular script
     ═══════════════════════════════════════════════════════ -->
<script>
/* ── Helpers ─────────────────────────────────────────── */
const $ = id => document.getElementById(id);
const rand = (a,b) => Math.floor(Math.random()*(b-a+1))+a;
const sleep = ms => new Promise(r => setTimeout(r, ms));
const clamp = (v,lo,hi) => Math.max(lo,Math.min(hi,v));

/* ── State ───────────────────────────────────────────── */
let heroHP, villainHP, maxHP = 100;
let fighting = false, paused = false, fightTimer = null;
let finalPhaseTriggered = false, ultraPhaseTriggered = false;
let heroName = 'Kopf', villainName = 'Zahl';
let animFrame;

/* ── DOM refs ────────────────────────────────────────── */
const bgCanvas   = $('bg-canvas');
const ctx        = bgCanvas.getContext('2d');
const flash      = $('flash-overlay');
const darkOv     = $('dark-overlay');
const startScr   = $('start-screen');
const battleScr  = $('battle-screen');
const endScr     = $('end-screen');
const arena      = $('arena');
const heroBr     = $('hero-hp-bar');
const villBr     = $('villain-hp-bar');
const heroTx     = $('hero-hp-text');
const villTx     = $('villain-hp-text');
const heroAv     = $('hero-avatar');
const villAv     = $('villain-avatar');
const logEl      = $('combat-log');
const phaseBnr   = $('phase-banner');
const specText   = $('special-text');
const beamEl     = $('beam');
const countEl    = $('countdown');
const groundCr   = $('ground-crack');
const particleC  = $('particles');

/* ══════════════════════════════════════════════════════
   BACKGROUND  –  animated energy field on canvas
   ══════════════════════════════════════════════════════ */
function resizeCanvas(){ bgCanvas.width=innerWidth; bgCanvas.height=innerHeight; }
addEventListener('resize', resizeCanvas);
resizeCanvas();

const stars = Array.from({length:120},()=>({
  x:Math.random()*innerWidth, y:Math.random()*innerHeight,
  r:Math.random()*1.8+.3, s:Math.random()*.4+.1, a:Math.random()
}));
const nebulae = Array.from({length:4},()=>({
  x:Math.random()*innerWidth, y:Math.random()*innerHeight,
  r:Math.random()*200+120, hue:Math.random()*360, speed:Math.random()*.2+.05,
  dx:Math.random()-.5, dy:Math.random()-.5
}));

let bgTime = 0;
function drawBG(){
  const W = bgCanvas.width, H = bgCanvas.height;
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0,0,W,H);
  bgTime += .003;

  /* nebulae */
  for(const n of nebulae){
    n.x += n.dx; n.y += n.dy;
    if(n.x<-n.r) n.x=W+n.r; if(n.x>W+n.r) n.x=-n.r;
    if(n.y<-n.r) n.y=H+n.r; if(n.y>H+n.r) n.y=-n.r;
    const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
    g.addColorStop(0,`hsla(${(n.hue+bgTime*40)%360},80%,50%,.08)`);
    g.addColorStop(1,'transparent');
    ctx.fillStyle = g; ctx.fillRect(n.x-n.r,n.y-n.r,n.r*2,n.r*2);
  }

  /* energy wave rings */
  for(let i=0;i<3;i++){
    const phase = bgTime*1.5+i*2.1;
    const radius = ((phase%4)/4)*Math.max(W,H)*.7;
    const alpha = .06*(1-((phase%4)/4));
    ctx.beginPath();
    ctx.arc(W/2,H/2,radius,0,Math.PI*2);
    ctx.strokeStyle = `rgba(100,180,255,${alpha})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  /* stars */
  for(const s of stars){
    s.a += .01*s.s;
    const alpha = .3+Math.sin(s.a)*.3;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle = `rgba(200,220,255,${alpha})`;
    ctx.fill();
  }

  /* scanline */
  const scanY = ((bgTime*80)%H);
  ctx.fillStyle='rgba(100,200,255,.015)';
  ctx.fillRect(0,scanY-1,W,2);

  animFrame = requestAnimationFrame(drawBG);
}
drawBG();

/* Ambient floating particles */
function spawnAmbientParticles(){
  for(let i=0;i<18;i++){
    const p=document.createElement('div');
    p.className='ambient-particle';
    const size=rand(2,5);
    const hue=rand(0,1)?rand(190,220):rand(340,360);
    Object.assign(p.style,{
      width:size+'px', height:size+'px',
      left:rand(0,100)+'%', bottom:'-10px',
      background:`hsla(${hue},80%,60%,.4)`,
      animationDuration:rand(6,14)+'s',
      animationDelay:rand(0,8)+'s'
    });
    particleC.appendChild(p);
  }
}
spawnAmbientParticles();

/* ══════════════════════════════════════════════════════
   EFFECTS SYSTEM
   ══════════════════════════════════════════════════════ */

/* Screen shake */
function shake(level='light'){
  document.body.classList.remove('shake-light','shake-medium','shake-heavy');
  void document.body.offsetWidth;
  document.body.classList.add(`shake-${level}`);
  setTimeout(()=>document.body.classList.remove(`shake-${level}`), level==='heavy'?500:level==='medium'?400:300);
}

/* Flash */
function flashScreen(dur=100, intensity=.7){
  flash.style.opacity=intensity;
  setTimeout(()=>flash.style.opacity=0, dur);
}

/* Dark overlay */
function setDark(on){ darkOv.style.opacity = on?1:0; }

/* Floating damage number */
function floatDmg(targetId, amount, isCrit, isSpecial){
  const el = $(targetId);
  const rect = el.getBoundingClientRect();
  const d = document.createElement('div');
  d.className='dmg-float';
  let txt = `-${amount}`;
  if(isSpecial) txt += ' 💀';
  else if(isCrit) txt += ' CRIT!';
  d.textContent = txt;
  d.style.left = (rect.left + rect.width/2 + rand(-30,30)) + 'px';
  d.style.top  = (rect.top + rand(-10,20)) + 'px';
  d.style.fontSize = isSpecial ? '2rem' : isCrit ? '1.6rem' : '1.1rem';
  d.style.color = isSpecial ? '#ff0' : isCrit ? '#ff4040' : '#fff';
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),1200);
}

/* Impact emoji burst */
function impactEmojis(targetId, count=4){
  const el = $(targetId);
  const rect = el.getBoundingClientRect();
  const emojis = ['💥','⚡','🔥','✨','💫','☄️'];
  for(let i=0;i<count;i++){
    const e = document.createElement('div');
    e.className='impact-emoji';
    e.textContent = emojis[rand(0,emojis.length-1)];
    e.style.left = (rect.left+rect.width/2)+'px';
    e.style.top  = (rect.top+rect.height/2)+'px';
    e.style.setProperty('--dx', rand(-120,120)+'px');
    e.style.setProperty('--dy', rand(-120,40)+'px');
    e.style.fontSize = rand(16,32)+'px';
    document.body.appendChild(e);
    setTimeout(()=>e.remove(),900);
  }
}

/* Burst particles (used in specials) */
function burstParticles(x,y,color,count=16){
  const emojis=['💥','⚡','🔥','✨','💫','☄️','💢','🌟'];
  for(let i=0;i<count;i++){
    const p=document.createElement('div');
    p.className='burst-particle';
    p.textContent=emojis[rand(0,emojis.length-1)];
    const angle=Math.random()*Math.PI*2;
    const dist=rand(80,250);
    p.style.left=x+'px'; p.style.top=y+'px';
    p.style.setProperty('--bx', Math.cos(angle)*dist+'px');
    p.style.setProperty('--by', Math.sin(angle)*dist+'px');
    p.style.fontSize=rand(14,36)+'px';
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),1000);
  }
}

/* Energy ring */
function energyRing(x,y,color){
  const r=document.createElement('div');
  r.className='energy-ring';
  r.style.color=color;
  r.style.left=x+'px'; r.style.top=y+'px';
  document.body.appendChild(r);
  setTimeout(()=>r.remove(),900);
}

/* Speed lines */
function speedLines(color='rgba(255,255,255,.3)', count=8){
  for(let i=0;i<count;i++){
    const l=document.createElement('div');
    l.className='speed-line';
    l.style.top=rand(10,90)+'%';
    l.style.left=rand(0,1)?'0':undefined;
    l.style.right=rand(0,1)?'0':undefined;
    if(!l.style.left && !l.style.right) l.style.left='0';
    l.style.background=`linear-gradient(90deg,transparent,${color},transparent)`;
    l.style.animationDelay=rand(0,200)+'ms';
    document.body.appendChild(l);
    setTimeout(()=>l.remove(),500);
  }
}

/* Glow pulse on avatar */
function glowAvatar(avEl){
  avEl.classList.remove('glow-pulse');
  void avEl.offsetWidth;
  avEl.classList.add('glow-pulse');
  setTimeout(()=>avEl.classList.remove('glow-pulse'),600);
}

/* Hit animation on avatar */
function hitAvatar(avEl){
  avEl.classList.remove('hit');
  void avEl.offsetWidth;
  avEl.classList.add('hit');
  setTimeout(()=>avEl.classList.remove('hit'),350);
}

/* Update HP bar */
function updateHP(){
  const hPct = clamp(heroHP/maxHP*100,0,100);
  const vPct = clamp(villainHP/maxHP*100,0,100);
  heroBr.style.width = hPct+'%';
  villBr.style.width = vPct+'%';
  heroTx.textContent  = `${Math.max(0,heroHP)} / ${maxHP}`;
  villTx.textContent  = `${Math.max(0,villainHP)} / ${maxHP}`;
  /* low HP color shift */
  if(hPct<30) heroBr.style.background='linear-gradient(90deg,#ff2020,#ff6020)';
  else heroBr.style.background='';
  if(vPct<30) villBr.style.background='linear-gradient(90deg,#ff2020,#ff6020)';
  else villBr.style.background='';
}

/* Combat log */
function logMsg(msg){
  const s=document.createElement('div');
  s.innerHTML=msg;
  logEl.prepend(s);
  if(logEl.children.length>60) logEl.lastChild.remove();
}

/* ══════════════════════════════════════════════════════
   BATTLE LOGIC
   ══════════════════════════════════════════════════════ */

/* Show phase banner */
async function showBanner(text,color,dur=1400){
  phaseBnr.textContent=text;
  phaseBnr.style.color=color;
  phaseBnr.classList.add('show');
  shake('medium');
  flashScreen(120,.4);
  await sleep(dur);
  phaseBnr.classList.remove('show');
}

/* ── Countdown ──────────────────────────────────────── */
async function countdown(){
  const nums=['3','2','1','FIGHT!'];
  for(const n of nums){
    countEl.textContent=n;
    countEl.classList.add('show');
    shake('light');
    flashScreen(60,.2);
    await sleep(n==='FIGHT!'?600:700);
    countEl.classList.remove('show');
    await sleep(150);
  }
}

/* ── Special Attack Cutscene ────────────────────────── */
async function triggerSpecial(attacker){
  paused=true;
  const isHero = attacker==='hero';
  const name   = isHero ? heroName : villainName;
  const move   = isHero ? 'KAMEHAMEHA!!!' : 'DARK LASER!!!';
  const color  = isHero ? 'var(--hero-color)' : 'var(--villain-color)';
  const rawClr = isHero ? '#00bfff' : '#ff2060';
  const dmg    = rand(20,35);

  /* 1. slow-mo + dark overlay */
  document.body.classList.add('slowmo');
  setDark(true);
  await sleep(400);

  /* 2. Special text */
  specText.textContent = move;
  specText.style.color = rawClr;
  specText.className = 'show';
  shake('heavy');
  flashScreen(100,.5);
  speedLines(rawClr+'99', 14);
  await sleep(600);

  /* 3. Energy rings from attacker */
  const avRect = (isHero?heroAv:villAv).getBoundingClientRect();
  for(let i=0;i<3;i++){
    energyRing(avRect.left+avRect.width/2, avRect.top+avRect.height/2, rawClr);
    await sleep(120);
  }
  await sleep(200);

  /* 4. Beam animation */
  beamEl.className = isHero ? 'hero-beam' : 'villain-beam';
  beamEl.style.opacity = '1';
  beamEl.style.width = '0';
  beamEl.style.transition = 'width .45s ease-in';
  if(isHero){
    beamEl.style.left = avRect.right+'px'; beamEl.style.right='auto';
  } else {
    beamEl.style.right = (innerWidth-avRect.left)+'px'; beamEl.style.left='auto';
  }
  beamEl.style.top = (avRect.top+avRect.height/2-9)+'px';
  await sleep(30);
  beamEl.style.width = '110vw';
  await sleep(200);

  /* 5. Multi-layered impact */
  flashScreen(180,.85);
  shake('heavy');
  const targRect = (isHero?villAv:heroAv).getBoundingClientRect();
  burstParticles(targRect.left+targRect.width/2, targRect.top+targRect.height/2, rawClr, 24);
  impactEmojis(isHero?'villain-avatar':'hero-avatar', 8);
  speedLines('#ffffff80', 12);
  energyRing(targRect.left+targRect.width/2, targRect.top+targRect.height/2, rawClr);
  await sleep(300);
  flashScreen(100,.6);
  shake('medium');
  await sleep(250);

  /* 6. Fade beam */
  beamEl.style.transition='opacity .3s';
  beamEl.style.opacity='0';

  /* 7. Apply damage */
  applyDamage(isHero?'villain':'hero', dmg, false, true);
  logMsg(`⚡ <b style="color:${rawClr}">${name}</b> uses <b>${move.replace(/!/g,'')}</b> for <b>${dmg}</b> damage!`);
  await sleep(300);

  /* 8. Hide Special text */
  specText.className='hide';
  await sleep(300);
  specText.className='';

  /* 9. Cleanup */
  setDark(false);
  document.body.classList.remove('slowmo');
  paused=false;
}

/* ── Apply Damage ───────────────────────────────────── */
function applyDamage(target, amount, isCrit, isSpecial){
  if(target==='hero'){
    heroHP = Math.max(0, heroHP-amount);
    hitAvatar(heroAv);
    floatDmg('hero-avatar', amount, isCrit, isSpecial);
    impactEmojis('hero-avatar', isCrit?6:isSpecial?8:3);
    glowAvatar(villAv);
  } else {
    villainHP = Math.max(0, villainHP-amount);
    hitAvatar(villAv);
    floatDmg('villain-avatar', amount, isCrit, isSpecial);
    impactEmojis('villain-avatar', isCrit?6:isSpecial?8:3);
    glowAvatar(heroAv);
  }
  updateHP();
}

/* ── Normal effects for a hit ───────────────────────── */
function showHitEffects(isCrit){
  if(isCrit){
    shake('medium');
    flashScreen(80,.35);
    speedLines('rgba(255,60,60,.4)',4);
  } else {
    shake('light');
  }
}

/* ── Attack Turn ────────────────────────────────────── */
async function attackTurn(){
  if(!fighting || paused) return;

  /* Check special (10%) for each side */
  const heroSpecial   = Math.random() < 0.10;
  const villSpecial   = Math.random() < 0.10;

  if(heroSpecial && heroHP>0 && villainHP>0){
    await triggerSpecial('hero');
    if(villainHP<=0){ endFight('hero'); return; }
  }
  if(villSpecial && villainHP>0 && heroHP>0){
    await triggerSpecial('villain');
    if(heroHP<=0){ endFight('villain'); return; }
  }
  if(paused || !fighting) return;

  /* Normal attacks */
  const heroCrit   = Math.random() < 0.15;
  const villCrit   = Math.random() < 0.15;
  let heroDmg  = rand(5,15); if(heroCrit)  heroDmg*=2;
  let villDmg  = rand(5,15); if(villCrit)  villDmg*=2;

  /* Final-phase boost */
  if(finalPhaseTriggered){ heroDmg=Math.round(heroDmg*1.2); villDmg=Math.round(villDmg*1.2); }

  /* Hero hits Villain */
  if(villainHP>0){
    applyDamage('villain', heroDmg, heroCrit, false);
    showHitEffects(heroCrit);
    logMsg(`🦸 <b style="color:var(--hero-color)">${heroName}</b> hits for <b>${heroDmg}</b>${heroCrit?' <span style="color:#f44">CRIT!</span>':''}`);
  }
  /* Villain hits Hero */
  if(heroHP>0){
    applyDamage('hero', villDmg, villCrit, false);
    showHitEffects(villCrit);
    logMsg(`🦹 <b style="color:var(--villain-color)">${villainName}</b> hits for <b>${villDmg}</b>${villCrit?' <span style="color:#f44">CRIT!</span>':''}`);
  }

  /* Phase checks */
  if(!finalPhaseTriggered && (heroHP<30 || villainHP<30)){
    finalPhaseTriggered=true;
    groundCr.classList.add('active');
    await showBanner('⚠️ FINAL PHASE ⚠️','#ff4040',1200);
  }
  if(!ultraPhaseTriggered && (heroHP<20 || villainHP<20)){
    ultraPhaseTriggered=true;
    await showBanner('🔥 ULTRA INSTINCT 🔥','#ffd700',1200);
  }

  /* Check death → final hit sequence */
  if(heroHP<=0 || villainHP<=0){
    const winner = heroHP<=0 ? 'villain' : 'hero';
    await finalHitSequence(winner);
    return;
  }

  /* Schedule next turn */
  const interval = ultraPhaseTriggered ? rand(600,900) : finalPhaseTriggered ? rand(350,500) : rand(400,600);
  fightTimer = setTimeout(attackTurn, interval);
}

/* ── Final Hit Sequence ─────────────────────────────── */
async function finalHitSequence(winner){
  fighting=false;
  clearTimeout(fightTimer);

  /* Pause */
  await sleep(300);

  /* Zoom */
  arena.classList.add('zoom-in');
  await sleep(400);

  /* Heavy shake + flash */
  shake('heavy');
  flashScreen(200,.9);
  speedLines('#ffffff90',16);
  const winAv = winner==='hero'?heroAv:villAv;
  const loseAv = winner==='hero'?villAv:heroAv;
  const rect = loseAv.getBoundingClientRect();
  burstParticles(rect.left+rect.width/2, rect.top+rect.height/2, '#fff', 30);
  impactEmojis(winner==='hero'?'villain-avatar':'hero-avatar', 12);
  await sleep(200);
  flashScreen(150,.7);
  shake('heavy');
  await sleep(400);

  /* Zoom out */
  arena.classList.remove('zoom-in');
  arena.classList.add('zoom-out');
  await sleep(600);
  arena.classList.remove('zoom-out');

  endFight(winner);
}

/* ── End Fight ──────────────────────────────────────── */
function endFight(winner){
  fighting = false;
  clearTimeout(fightTimer);
  groundCr.classList.remove('active');

  const name = winner==='hero'?heroName:villainName;
  const emoji= winner==='hero'?'🦸':'🦹';

  $('winner-text').textContent = `🏆 ${name} WINS! 🏆`;
  $('winner-emoji').textContent = emoji;

  /* Glow winner avatar */
  (winner==='hero'?heroAv:villAv).classList.add('winner-glow');

  endScr.classList.add('show');
}

/* ── Start Fight ────────────────────────────────────── */
async function startFight(){
  await countdown();
  fighting=true;
  attackTurn();
}

/* ── Start Game ─────────────────────────────────────── */
function startGame(){
  heroName    = $('hero-name-input').value.trim() || 'Kopf';
  villainName = $('villain-name-input').value.trim() || 'Zahl';
  $('hero-name').textContent   = heroName;
  $('villain-name').textContent = villainName;

  heroHP = maxHP; villainHP = maxHP;
  finalPhaseTriggered = false;
  ultraPhaseTriggered = false;
  updateHP();

  logEl.innerHTML='';
  startScr.classList.add('hide');
  setTimeout(()=>{
    battleScr.classList.add('show');
    startFight();
  },800);
}

/* ── Restart ────────────────────────────────────────── */
function restart(){
  endScr.classList.remove('show');
  battleScr.classList.remove('show');
  heroAv.classList.remove('winner-glow');
  villAv.classList.remove('winner-glow');
  heroBr.style.background=''; villBr.style.background='';
  fighting=false; paused=false;
  clearTimeout(fightTimer);
  setTimeout(()=>{ startScr.classList.remove('hide'); },400);
}

/* ── Bindings ───────────────────────────────────────── */
$('start-btn').addEventListener('click', startGame);
$('restart-btn').addEventListener('click', restart);

/* Prevent double fire */
let startLock=false;
$('start-btn').addEventListener('click', e=>{
  if(startLock) e.stopImmediatePropagation();
  startLock=true; setTimeout(()=>startLock=false,2000);
}, true);

/* Enter key → start */
document.addEventListener('keydown', e=>{
  if(e.key==='Enter' && !startScr.classList.contains('hide')) startGame();
});
</script>
