<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>EPIC FINAL BATTLE</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <canvas id="c"></canvas>
  <div id="flash"></div>

  <div id="start">
    <h1>EPIC FINAL BATTLE</h1>
    <h2>COIN FLIP COMBAT</h2>
    <input id="p1" placeholder="PLAYER 1 NAME" maxlength="16" autocomplete="off" spellcheck="false">
    <input id="p2" placeholder="PLAYER 2 NAME" maxlength="16" autocomplete="off" spellcheck="false">
    <button id="go">FIGHT</button>
  </div>

  <div id="end">
    <div id="winnerName"></div>
    <button id="restartBtn">REMATCH</button>
  </div>

  <script src="js/engine.js"></script>
  <script src="js/fighter.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
